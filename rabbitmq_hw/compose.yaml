services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - '5672:5672' 
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD:-guest}
    networks:
      - api-network
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    env_file:
      - .env
    volumes:
      - minio_data:/data
    networks:
      - api-network
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: prod-distroless
    ports:
      - '${PORT:-8080}:3000'
    env_file:
      - .env
    networks:
      - db-network
      - api-network
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  migrate:
    build:
      context: .
      target: tools
    command: pnpm run db:migrate
    env_file:
      - .env
    profiles:
      - tools
    networks:
      - db-network
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      target: tools
    command: pnpm run db:seed
    env_file:
      - .env
    profiles:
      - tools
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - db-network

networks:
  db-network:
    driver: bridge
    internal: true
  api-network:
    driver: bridge

volumes:
  pgdata:
  minio_data:
  rabbit_data: